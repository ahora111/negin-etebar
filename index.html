<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>وام‌یار | مدیریت مشتریان و پورسانت</title>
<meta name="theme-color" content="#0B0F1E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="وام‌یار">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.svg">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Lalezar&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css">
<link rel="stylesheet" href="css/style.css">
<!-- Firebase (compat SDK - works with plain <script> tags, no bundler needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check-compat.js"></script>
<!-- SheetJS (xlsx) - client-side Excel (.xlsx) file generation, no server/backend needed -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- Prominent banner shown whenever the connection to the cloud (internet/VPN) is
     lost - separate from the small topbar sync badge, so it can't be missed. Hidden
     by default; toggled by CloudSync in js/firebase-sync.js. -->
<div id="connection-banner" class="connection-banner hidden" role="alert"></div>

<!-- ===================== LOGIN VIEW ===================== -->
<section id="view-login" class="view">
  <div class="login-box">
    <div class="brand">
      <div class="brand-logo">وام</div>
      <h1 class="brand-title">وام‌یار</h1>
      <p class="muted">مدیریت مشتریان، پورسانت و خدمات دریافت وام</p>
    </div>
    <form id="form-login">
      <label>نام کاربری
        <input type="text" id="login-username" required autocomplete="username">
      </label>
      <label>رمز عبور
        <input type="password" id="login-password" required autocomplete="current-password">
      </label>
      <div id="login-error" class="error-text"></div>
      <button type="submit" class="btn btn-primary btn-block">ورود</button>
    </form>
    <p class="muted small">اگر رمز عبور خود را فراموش کرده‌اید، با مدیر سیستم تماس بگیرید.</p>
    <span id="online-badge" class="badge">آفلاین آماده است ✓</span>
  </div>
</section>

<!-- ===================== APP SHELL ===================== -->
<div id="app-shell" class="hidden">
  <header class="topbar">
    <div class="topbar-brand">
      <button id="btn-menu" class="icon-btn" aria-label="منو">☰</button>
      <div class="topbar-title" id="topbar-title">وام‌یار</div>
    </div>
    <div class="topbar-user">
      <span id="sync-status" class="sync-badge off">☁️ در حال اتصال...</span>
      <button id="btn-today-reminders" class="icon-btn reminder-bell-btn" title="یادآوری‌های امروز">
        🔔<span id="reminder-bell-badge" class="reminder-bell-badge hidden">0</span>
      </button>
      <span id="current-user-name"></span>
      <button id="btn-logout" class="icon-btn" aria-label="خروج" title="خروج">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4H8a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h7"/><path d="M18 15l4-3-4-3"/><path d="M22 12H10"/></svg>
      </button>
    </div>
  </header>

  <nav id="sidebar" class="sidebar">
    <button id="btn-close-sidebar" class="icon-btn sidebar-close-btn" aria-label="بستن منو" title="بستن">✕</button>
    <div class="sidebar-user">
      <button type="button" id="sidebar-avatar-wrap" class="avatar-wrap" title="تغییر عکس پروفایل" aria-label="تغییر عکس پروفایل">
        <div id="sidebar-avatar" class="avatar">؟</div>
        <span class="avatar-edit-badge">📷</span>
      </button>
      <input type="file" id="input-avatar" accept="image/*" hidden>
      <div>
        <div id="sidebar-name" class="sidebar-name"></div>
        <div id="sidebar-role" class="sidebar-role muted"></div>
      </div>
    </div>
    <ul class="nav-list" id="nav-list"></ul>
    <details class="sidebar-tools">
      <summary>🛠️ ابزار و پشتیبان‌گیری</summary>
      <div class="sidebar-tools-body">
        <button id="btn-backup" class="btn btn-ghost btn-block">📦 پشتیبان‌گیری از داده‌ها (JSON)</button>
        <button id="btn-backup-excel" class="btn btn-ghost btn-block">📊 خروجی اکسل</button>
        <label class="btn btn-ghost btn-block file-btn">
          ⬆️ بازیابی/دریافت فایل پشتیبان
          <input type="file" id="input-restore" accept="application/json" hidden>
        </label>
        <div id="auto-backup-status" class="muted auto-backup-status hidden"></div>
      </div>
    </details>
  </nav>
  <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

  <main id="main-content" class="main-content"></main>

  <!-- Native-style bottom tab bar (mobile only — hidden at desktop widths via CSS).
       Populated by buildBottomNav() in app.js from the same permission-aware item
       list buildNav() uses for the sidebar, so it never drifts out of sync with a
       user's role. Always ends with a "بیشتر" tab that opens the full sidebar for
       every item that doesn't fit in the bar. -->
  <nav id="bottom-nav" class="bottom-nav" aria-label="پیمایش اصلی"></nav>
</div>

<!-- ===================== TEMPLATES ===================== -->

<template id="tpl-dashboard-caller">
  <div class="page">
    <div class="page-head">
      <h2>مشتریان جذب‌شده توسط من</h2>
      <div class="page-head-actions">
        <button class="btn btn-primary" id="btn-add-lead">+ ثبت مشتری تلفنی جدید</button>
        <!-- فقط برای جذب‌کننده‌ای که دسترسی «پیگیری مراحل دریافت وام» دارد نمایش داده می‌شود
             (در app.js حذف می‌شود اگر canProcessCustomers نداشته باشد). برای وقتی که مشتریِ
             جذب‌شده توسط یک همکار دیگر، شخصاً توسط این کاربر در دفتر پردازش می‌شود. -->
        <button class="btn btn-primary" id="btn-office-file-add">+ ثبت پرونده دفتر جدید</button>
      </div>
    </div>
    <div class="stat-row" id="caller-stats"></div>
    <div class="filter-row">
      <input type="text" id="caller-search" placeholder="جستجو بر اساس نام، تلفن یا کد ملی...">
    </div>
    <h3 class="section-title">لیدهای ثبت‌شده (در انتظار مراجعه حضوری)</h3>
    <div id="leads-list" class="card-list"></div>
    <h3 class="section-title">مشتریانی که به من متصل شده‌اند</h3>
    <div id="caller-customers-list" class="card-list"></div>
  </div>
</template>

<template id="tpl-dashboard-processor">
  <div class="page">
    <div class="page-head">
      <h2>مشتریان من</h2>
      <button class="btn btn-primary" id="btn-add-customer">+ ثبت مشتری جدید</button>
    </div>
    <div class="stat-row" id="processor-stats"></div>
    <div class="filter-row">
      <select id="filter-stage-processor">
        <option value="">همه مراحل</option>
        <option value="awaiting_docs">در انتظار تکمیل مدارک</option>
        <option value="awaiting_score">مدارک تکمیل شد - در انتظار دریافت امتیاز</option>
        <option value="awaiting_withdrawal">امتیاز دریافت شد - در انتظار برداشت - تسویه</option>
        <option value="completed">تکمیل شد</option>
      </select>
      <input type="text" id="filter-search-processor" placeholder="جستجو بر اساس نام، تلفن یا کد ملی...">
    </div>
    <div id="customers-list-processor" class="card-list"></div>
  </div>
</template>

<template id="tpl-dashboard-admin">
  <div class="page">
    <div class="page-head">
      <h2>نمای کلی مدیریت</h2>
      <button class="btn btn-primary" id="btn-add-customer-admin">+ ثبت مشتری جدید</button>
    </div>
    <div class="stat-row" id="admin-stats"></div>
    <div class="filter-row">
      <select id="filter-stage-admin">
        <option value="">همه مراحل</option>
        <option value="awaiting_docs">در انتظار تکمیل مدارک</option>
        <option value="awaiting_score">مدارک تکمیل شد - در انتظار دریافت امتیاز</option>
        <option value="awaiting_withdrawal">امتیاز دریافت شد - در انتظار برداشت - تسویه</option>
        <option value="completed">تکمیل شد</option>
      </select>
      <select id="filter-processor"><option value="">همه کارشناسان</option></select>
      <select id="filter-caller"><option value="">همه جذب‌کننده‌ها</option></select>
      <input type="text" id="filter-search-admin" placeholder="جستجو بر اساس نام، تلفن یا کد ملی...">
      <select id="filter-sort">
        <option value="new">جدیدترین</option>
        <option value="old">قدیمی‌ترین</option>
        <option value="amount-desc">بیشترین مبلغ وام</option>
        <option value="amount-asc">کمترین مبلغ وام</option>
      </select>
    </div>
    <div id="customers-count" class="muted small" style="margin-bottom:10px;"></div>
    <div id="customers-list-admin" class="card-list"></div>
  </div>
</template>

<template id="tpl-users">
  <div class="page">
    <div class="page-head">
      <h2>مدیریت کاربران</h2>
      <button class="btn btn-primary" id="btn-add-user">+ کاربر جدید</button>
    </div>
    <div class="filter-row">
      <input type="text" id="users-search" placeholder="جستجو بر اساس نام یا نام کاربری...">
    </div>
    <div id="users-list" class="card-list"></div>
  </div>
</template>

<template id="tpl-report">
  <div class="page">
    <div class="page-head"><h2>گزارش مالی و سود</h2></div>
    <div class="report-controls">
      <label>از تاریخ (شمسی)
        <div class="jalali-date-selects" id="report-from-wrap"></div>
      </label>
      <label>تا تاریخ (شمسی)
        <div class="jalali-date-selects" id="report-to-wrap"></div>
      </label>
      <button class="btn btn-secondary" id="btn-report-today">امروز</button>
      <button class="btn btn-primary" id="btn-report-run">محاسبه</button>
    </div>
    <div id="report-result"></div>
    <div class="section-title">پرداخت پورسانت کاربران</div>
    <p class="muted small">این بخش مستقل از بازه‌ی تاریخ بالاست و مجموع همه‌ی پورسانت‌های تعلق‌گرفته (از ابتدا) به هر کاربر را نشان می‌دهد.</p>
    <div id="commission-payouts"></div>
  </div>
</template>

<template id="tpl-settings">
  <div class="page">
    <div class="page-head">
      <h2>تنظیمات پورسانت</h2>
    </div>
    <form id="form-settings" class="modal-form settings-form">
      <p class="muted small">
        به‌صورت پیش‌فرض، به ازای هر مشتری که وامش تکمیل شود، نیم درصد (۰.۵٪) از مبلغ کل وام به کاربر جذب‌کننده و
        نیم درصد (۰.۵٪) از مبلغ کل وام به کارشناس دفتر به‌عنوان پورسانت تعلق می‌گیرد. این مقادیر قابل تغییرند.
      </p>
      <div class="form-grid">
        <label>درصد پورسانت جذب‌کننده مشتری (٪)
          <input type="number" step="0.01" min="0" max="100" name="callerPercent" id="settings-caller-percent">
        </label>
        <label>درصد پورسانت کارشناس دفتر (٪)
          <input type="number" step="0.01" min="0" max="100" name="processorPercent" id="settings-processor-percent">
        </label>
      </div>
      <label class="check-inline">
        <input type="checkbox" name="manualMode" id="settings-manual-mode">
        محاسبه خودکار بر اساس درصد را برای همه غیرفعال کن و اجازه بده مبلغ پورسانت هر مشتری را خودم (مدیر) به‌صورت دستی وارد کنم
      </label>

      <fieldset class="fieldset">
        <legend>محاسبه دستی پورسانت برای کاربران خاص</legend>
        <p class="muted small">
          حتی وقتی حالت بالا خاموش است (محاسبه خودکار بر اساس درصد)، می‌توانید کاربران جذب‌کننده یا کارشناسی خاصی را انتخاب کنید
          که پورسانتشان همیشه به‌صورت دستی وارد شود (مثلاً چون قرارداد متفاوتی دارند).
        </p>
        <div id="settings-manual-users-list" class="card-list"></div>
      </fieldset>

      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">ذخیره تنظیمات</button>
      </div>
    </form>
  </div>
</template>

<template id="tpl-templates">
  <div class="page">
    <div class="page-head">
      <h2>توضیحات آماده وام‌ها</h2>
      <button class="btn btn-primary" id="btn-add-template">+ افزودن توضیح آماده</button>
    </div>
    <p class="muted small" id="templates-intro"></p>
    <div class="filter-row">
      <input type="text" id="templates-search" placeholder="جستجو بر اساس عنوان...">
    </div>
    <div id="templates-list" class="card-list"></div>
  </div>
</template>

<!-- ===================== LOAN PRODUCTS MANAGEMENT (admin) ===================== -->
<template id="tpl-loan-products">
  <div class="page">
    <div class="page-head">
      <h2>🏦 مدیریت محصولات وام</h2>
      <button class="btn btn-primary" id="btn-add-loan-product">+ افزودن محصول وام جدید</button>
    </div>
    <p class="muted small">
      هر محصول وام شامل فرمول‌های قابل‌تنظیم برای محاسبه قسط اول، اقساط خاص، سایر اقساط
      و مبلغ قابل دریافت است. برای افزودن وام جدید نیازی به تغییر کد نیست — فقط یک محصول
      جدید بسازید و فرمول‌ها را وارد کنید.
    </p>
    <div class="filter-row">
      <input type="text" id="loan-products-search" placeholder="جستجو بر اساس نام بانک یا طرح...">
      <select id="loan-products-filter">
        <option value="">همه (فعال و بایگانی‌شده)</option>
        <option value="active" selected>فقط فعال</option>
        <option value="archived">فقط بایگانی‌شده</option>
      </select>
    </div>
    <div id="loan-products-list" class="card-list"></div>
  </div>
</template>

<!-- ===================== LOAN CALCULATOR (user) ===================== -->
<template id="tpl-loan-calc">
  <div class="page">
    <div class="page-head">
      <h2>🧮 محاسبه وام</h2>
    </div>
    <p class="muted small">
      بانک و طرح وام را انتخاب کنید و سپس مبلغ وام یا مبلغ موردنیاز (قدرت خرید) را وارد نمایید.
      سیستم تمام اقساط و مبالغ را بر اساس فرمول‌های تعریف‌شده محاسبه می‌کند.
    </p>
    <div class="filter-row" style="margin-bottom:8px;">
      <select id="loan-calc-product" style="min-width:240px;">
        <option value="">— انتخاب بانک / طرح وام —</option>
      </select>
    </div>
    <div id="loan-calc-description" class="hidden" style="margin-bottom:14px;"></div>
    <fieldset class="fieldset" id="loan-calc-input-fieldset">
      <legend>ورودی محاسبه</legend>
      <div class="loan-calc-input-row">
        <label class="loan-calc-mode-opt">
          <input type="radio" name="loan-calc-mode" value="loanAmount" checked>
          <span>مبلغ وام را وارد می‌کنم</span>
        </label>
        <label class="loan-calc-mode-opt">
          <input type="radio" name="loan-calc-mode" value="purchasableAmount">
          <span>مبلغ موردنیاز / قدرت خرید را وارد می‌کنم</span>
        </label>
      </div>
      <label id="loan-calc-amount-wrap">
        <span id="loan-calc-amount-label">مبلغ وام (تومان)</span>
        <input type="text" inputmode="numeric" id="loan-calc-amount" class="money-input" placeholder="مثلاً 100,000,000">
      </label>
      <button type="button" class="btn btn-primary" id="btn-loan-calc-run">محاسبه</button>
    </fieldset>
    <div id="loan-calc-result"></div>
  </div>
</template>

<!-- ===================== LOAN PRODUCT FORM MODAL ===================== -->
<template id="tpl-modal-loan-product">
  <form id="form-loan-product" class="modal-form">
    <h3 id="loan-product-form-title">محصول وام جدید</h3>

    <div class="loan-form-section">
      <h4>مشخصات</h4>
      <div class="form-grid">
        <label>نام بانک <input type="text" name="bankName" required placeholder="بانک مهر ایران"></label>
        <label>نام طرح <input type="text" name="schemeName" placeholder="وام مسکن"></label>
        <label>تعداد اقساط <input type="number" name="installmentsCount" min="1" max="360" required value="24"></label>
      </div>
      <label>توضیحات <textarea name="description" rows="2" placeholder="شرایط وام، مدارک لازم..."></textarea></label>
      <label class="check-inline">
        <input type="checkbox" name="archived"> بایگانی (در لیست کاربران نمایش داده نمی‌شود)
      </label>
    </div>

    <div class="loan-form-section">
      <h4>ثابت‌ها <span class="loan-hint">متغیرهای دلخواه برای استفاده در فرمول‌ها</span></h4>
      <div id="loan-product-constants-list" class="loan-constants-list"></div>
      <button type="button" class="btn btn-ghost btn-sm" id="btn-add-constant">+ ثابت جدید</button>
    </div>

    <div class="loan-form-section">
      <h4>فرمول‌ها</h4>
      <details class="loan-formula-guide">
        <summary>📖 راهنمای فرمول‌نویسی</summary>
        <div class="loan-formula-guide-body">
          <div class="loan-formula-vars">
            <div><code>L</code> — مبلغ وام</div>
            <div><code>N</code> — تعداد کل اقساط</div>
            <div><code>I</code> — شماره قسط فعلی (از ۱)</div>
            <div><code>R</code> — مانده وام قبل از این قسط</div>
          </div>
          <div class="loan-formula-extras">
            <div><code>4%</code> — معادل 4/100</div>
            <div><code>Math_round(x)</code> — گرد کردن</div>
            <div><code>Math_ceil(x)</code> — سقف (بالا گرد)</div>
            <div><code>Math_floor(x)</code> — کف (پایین گرد)</div>
          </div>
          <div class="loan-formula-examples">
            <b>مثال:</b>
            <code>L * 4/100</code> یا <code>L * 4%</code> → ۴ درصد مبلغ وام<br>
            <code>L / (N - 2)</code> → مبلغ وام تقسیم بر (کل اقساط منهای اقساط ویژه)<br>
            <code>L - L * 40%</code> → مبلغ وام منهای ۴۰ درصد
          </div>
          <div class="loan-formula-constants-hint">
            <b>ثابت‌ها:</b> می‌توانید متغیرهای دلخواه تعریف کنید (مثلاً <code>deductPercent = 40</code>) و در فرمول از نام آن استفاده کنید.
          </div>
        </div>
      </details>
      <label>قسط اول <input type="text" name="firstInstallment" class="formula-input" placeholder="L * 4%"></label>
      <label>سایر اقساط <input type="text" name="otherInstallments" class="formula-input" placeholder="L / (N - 2)"></label>
      <label>مبلغ قابل دریافت (قدرت خرید) <input type="text" name="purchasableAmount" class="formula-input" placeholder="L - L * 40%"></label>
      <label>فرمول معکوس (اختیاری) <input type="text" name="loanAmountFromPurchasable" class="formula-input" placeholder="P / (1 - 40%)"></label>
    </div>

    <div class="loan-form-section">
      <h4>اقساط خاص <span class="loan-hint">از <code>R</code> (مانده) استفاده کنید</span></h4>
      <div id="loan-product-special-list" class="loan-special-list"></div>
